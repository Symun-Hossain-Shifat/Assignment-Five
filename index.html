<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind & DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>


<body class="">
    <form class=" w-8/11 md:w-4/11 mx-auto  border-b-slate-500  shadow-md pb-2" >
        <div class="title-container text-center py-2 items-center w-5/10 mx-auto">
            <img class="w-15 mx-auto" src="assets/github-logo.png" alt="">
            <div>
            <h1 class="font-bold ">GitHub Issues Tracker</h1>
            <p class="text-gray-600 font-semibold text-sm">Sign in to manage your issues</p>
            </div>
            
        </div>
 <fieldset class="fieldset w-full md:w-xs mx-auto">
  

  <label class="label text-black text-[15px] font-semibold">Username</label>
  <input type="text" id="username" class="input" placeholder="Enter Your Username" />
  <p class="text-blue-800 font-semibold">Default: admin</p>
  
  <label class="label  text-black text-[15px] font-semibold">Password</label>
  <input type="password" id="password" class="input" placeholder="Password" />
  <p class="text-blue-800 font-semibold">Default: admin123</p>
  <button id="signin-btn" type="button" class="btn btn-primary mt-4">Sign In</button>
</fieldset> 
 <div class="text-center my-5 space-y-4">
    <p class="text-gray-600">Demo Credentials:</p>
    <div class="w-2/5 mx-auto bg-gray-100 p-2">
        <p>Username: admin</p>

<p>Password: admin123</p>
    </div>
 </div>

    </form>






    <script src="script.js"></script>
</body>
</html>
